[project]
name = "hca-schema-validator"
version = "0.14.0"
description = "HCA schema validation for single-cell datasets"
authors = [{ name = "Clever Canary", email = "dave@clevercanary.com" }]
license = "MIT"
license-files = ["NOTICE"]
readme = "README.md"
requires-python = ">=3.10,<4.0"
# These are cellxgene-schema 7.0.1's pins, not ours. The vendored validator has
# to reproduce that environment to behave identically, so do not relax them to
# suit another package.
dependencies = [
    "anndata==0.11.4",
    "cellxgene-ontology-guide==1.9.0",
    "click<9",
    "dask[array,dataframe]==2024.12.0",
    "duckdb==1.3.2",
    "ibis-framework[duckdb]>=10.3",
    "numpy<3",
    "pandas>2,<3",
    "pyarrow>=19",
    "pyyaml<7",
    "scipy<1.16",
    "sparse==0.15.1",
    "semver<4",
    "xxhash<4",
    "zstandard>=0.22.0,<1",
    "matplotlib<4",
    "pysam>=0.13.0",
]

[project.urls]
Homepage = "https://github.com/clevercanary/hca-validation-tools"

[dependency-groups]
dev = ["pytest>=8.0,<9", "pyright>=1.1.408,<2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Ships every file under the package directory. The vendored cellxgene
# gencode/migrate/schema data files and the ontology_data overlay reach the
# wheel this way; the validator is non-functional without them.
[tool.hatch.build.targets.wheel]
packages = ["src/hca_schema_validator"]
