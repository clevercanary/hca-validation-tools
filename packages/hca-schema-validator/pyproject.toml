[tool.poetry]
name = "hca-schema-validator"
version = "0.9.1"
description = "HCA schema validation for single-cell datasets"
authors = ["Clever Canary <dave@clevercanary.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://github.com/clevercanary/hca-validation-tools"
packages = [{include = "hca_schema_validator", from = "src"}]

[tool.poetry.dependencies]
python = "^3.10"
# Dependencies aligned with cellxgene-schema 7.0.1 pins
anndata = "==0.11.4"
cellxgene-ontology-guide = "==1.9.0"
click = "<9"
dask = {extras = ["array", "dataframe"], version = "==2024.12.0"}
duckdb = "==1.3.2"
ibis-framework = {extras = ["duckdb"], version = ">=10.3"}
numpy = "<3"
pandas = ">2,<3"
pyarrow = ">=19"
pyyaml = "<7"
scipy = "<1.16"
sparse = "==0.15.1"
semver = "<4"
xxhash = "<4"
zstandard = ">=0.22.0,<1"
matplotlib = "<4"
pysam = ">=0.13.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
