[project]
name = "hca-anndata-mcp"
version = "0.7.1"
description = "MCP server for interactive exploration of AnnData h5ad files"
authors = [{ name = "Clever Canary", email = "dave@clevercanary.com" }]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10,<4.0"
# The sibling bounds below are what ship to PyPI. They must stay bounded: uv
# strips [tool.uv.sources] at build time, so a sibling listed without a version
# constraint would publish as an unbounded Requires-Dist.
#
# The upper bound is the next minor, not <1. Per the release policy in
# CLAUDE.md, 0.x packages signal breaking changes with a minor bump, so <1
# would accept versions this package was never tested against.
dependencies = [
    "fastmcp>=2,<3",
    "hca-anndata-tools>=0.6,<0.7",
    "hca-schema-validator>=0.14,<0.15",
]

[project.urls]
Homepage = "https://github.com/clevercanary/hca-validation-tools"

[project.scripts]
hca-anndata-mcp = "hca_anndata_mcp.main:run"

# Development only: resolves the siblings from the local checkout. uv strips
# this at build time and publishes the version constraints declared above.
[tool.uv.sources]
hca-anndata-tools = { path = "../hca-anndata-tools", editable = true }
hca-schema-validator = { path = "../hca-schema-validator", editable = true }

[dependency-groups]
dev = ["pytest>=8.0,<9", "pytest-asyncio>=0.23", "pyright>=1.1.408,<2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hca_anndata_mcp"]
