[tool.poetry]
name = "hca-anndata-mcp"
version = "0.3.0"
description = "MCP server for interactive exploration of AnnData h5ad files"
authors = ["Clever Canary <dave@clevercanary.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://github.com/clevercanary/hca-validation-tools"
packages = [{include = "hca_anndata_mcp", from = "src"}]

[tool.poetry.dependencies]
python = "^3.10"
fastmcp = ">=2,<3"
hca-anndata-tools = {path = "../hca-anndata-tools", develop = true}
hca-schema-validator = {path = "../hca-schema-validator", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = ">=0.23"
pyright = "^1.1.408"

[tool.poetry.scripts]
hca-anndata-mcp = "hca_anndata_mcp.main:run"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
