name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      hca_schema_validator_release: ${{ steps.release.outputs['packages/hca-schema-validator--release_created'] }}
      hca_anndata_tools_release: ${{ steps.release.outputs['packages/hca-anndata-tools--release_created'] }}
      hca_anndata_mcp_release: ${{ steps.release.outputs['packages/hca-anndata-mcp--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish-hca-schema-validator:
    needs: release-please
    if: |
      !failure() && !cancelled() &&
      (needs['release-please'].outputs.hca_schema_validator_release == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin both the build tool and the interpreter. Either one floating
          # means a release can change or break with no change on our side:
          # uv is pre-1.0 and `uv build` behaviour moves, and ubuntu-latest's
          # default Python moves with the runner image. Bump these
          # deliberately. Dev-side pinning is tracked in #480.
          version: "0.10.9"
          python-version: "3.11"

      - name: Build package
        run: uv build
        working-directory: packages/hca-schema-validator

      - name: Check sibling dependency bounds
        run: uv run --no-project --with packaging python scripts/check_sibling_deps.py packages/hca-schema-validator/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hca-schema-validator/dist/

  publish-hca-anndata-tools:
    needs: release-please
    if: |
      !failure() && !cancelled() &&
      (needs['release-please'].outputs.hca_anndata_tools_release == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin both the build tool and the interpreter. Either one floating
          # means a release can change or break with no change on our side:
          # uv is pre-1.0 and `uv build` behaviour moves, and ubuntu-latest's
          # default Python moves with the runner image. Bump these
          # deliberately. Dev-side pinning is tracked in #480.
          version: "0.10.9"
          python-version: "3.11"

      - name: Build package
        run: uv build
        working-directory: packages/hca-anndata-tools

      - name: Check sibling dependency bounds
        run: uv run --no-project --with packaging python scripts/check_sibling_deps.py packages/hca-anndata-tools/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hca-anndata-tools/dist/

  publish-hca-anndata-mcp:
    needs: [release-please, publish-hca-anndata-tools, publish-hca-schema-validator]
    # Use always() + explicit result checks so mcp still publishes when
    # sibling publish jobs are intentionally skipped (e.g. only mcp is in
    # this release). !failure() alone is unreliable: GitHub Actions can
    # propagate skipped-dep state to downstream jobs.
    if: |
      always() && !cancelled() &&
      (needs['release-please'].outputs.hca_anndata_mcp_release == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs['publish-hca-anndata-tools'].result == 'success' || needs['publish-hca-anndata-tools'].result == 'skipped') &&
      (needs['publish-hca-schema-validator'].result == 'success' || needs['publish-hca-schema-validator'].result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin both the build tool and the interpreter. Either one floating
          # means a release can change or break with no change on our side:
          # uv is pre-1.0 and `uv build` behaviour moves, and ubuntu-latest's
          # default Python moves with the runner image. Bump these
          # deliberately. Dev-side pinning is tracked in #480.
          version: "0.10.9"
          python-version: "3.11"

      - name: Build package
        run: uv build
        working-directory: packages/hca-anndata-mcp

      - name: Check sibling dependency bounds
        run: uv run --no-project --with packaging python scripts/check_sibling_deps.py packages/hca-anndata-mcp/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hca-anndata-mcp/dist/
